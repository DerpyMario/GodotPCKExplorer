# Build and Release Godot projects (PCK Explorer + PCK Bruteforcer)
# Triggers on tag pushes (e.g. git tag v1.0.0 && git push origin v1.0.0)
# and can be manually triggered.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write  # required so workflow can create releases

env:
  GODOT_VERSION: '4.2.2'        # change to the Godot version you use
  EXPORT_PRESETS_FILE: 'export_presets.cfg' # change if you use a different name

jobs:
  build-linux-windows:
    name: Build (Linux + Windows) for projects
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project_path:
          - 'projects/PCKExplorer'
          - 'projects/PCKBruteforcer'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        uses: game-ci/setup-godot@v2
        with:
          godot-version: ${{ env.GODOT_VERSION }}
          export-templates: true

      - name: Show Godot version
        run: godot --version

      - name: Ensure dist folder
        run: mkdir -p ${{ matrix.project_path }}/dist

      - name: Export Linux build
        working-directory: ${{ matrix.project_path }}
        run: |
          set -e
          mkdir -p dist
          # Replace "Linux/X11" with the export preset name in your export_presets.cfg
          godot --export "Linux/X11" dist/${{ matrix.project_path##*/ }}-linux
          # make it a tar.gz for distribution
          tar -C dist -czf dist/${{ matrix.project_path##*/ }}-linux.tar.gz ${{ matrix.project_path##*/ }}-linux || true

      - name: Export Windows build
        working-directory: ${{ matrix.project_path }}
        run: |
          set -e
          mkdir -p dist
          # Replace "Windows Desktop" with the export preset name in your export_presets.cfg
          godot --export "Windows Desktop" dist/${{ matrix.project_path##*/ }}-win.exe || true
          zip -j dist/${{ matrix.project_path##*/ }}-win.zip dist/${{ matrix.project_path##*/ }}-win.exe || true

      - name: Package other artifacts
        working-directory: ${{ matrix.project_path }}
        run: |
          # include README or license if you like:
          ls -la
          # Create a single zip that includes dist contents
          cd dist
          zip -r ../${{ matrix.project_path##*/ }}-artifacts.zip . || true
        shell: bash

      - name: Upload artifact (per project)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.project_path##*/ }}-artifacts
          path: |
            ${{ matrix.project_path }}/dist/*.tar.gz
            ${{ matrix.project_path }}/dist/*.zip
            ${{ matrix.project_path }}/dist/*.exe
            ${{ matrix.project_path }}-artifacts.zip

  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    needs: build-linux-windows
    strategy:
      matrix:
        project_path:
          - 'projects/PCKExplorer'
          - 'projects/PCKBruteforcer'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot (macOS)
        uses: game-ci/setup-godot@v2
        with:
          godot-version: ${{ env.GODOT_VERSION }}
          export-templates: true

      - name: Show Godot version
        run: godot --version

      - name: Ensure dist folder
        run: mkdir -p ${{ matrix.project_path }}/dist

      - name: Export macOS build
        working-directory: ${{ matrix.project_path }}
        run: |
          set -e
          mkdir -p dist
          # Replace "Mac OSX" with the export preset name in your export_presets.cfg
          godot --export "Mac OSX" dist/${{ matrix.project_path##*/ }}-mac.zip || true

      - name: Upload mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.project_path##*/ }}-mac-artifacts
          path: |
            ${{ matrix.project_path }}/dist/*.zip
            ${{ matrix.project_path }}/dist/*.dmg
            ${{ matrix.project_path }}/dist/*.app

  release:
    name: Create GitHub Release and upload artifacts
    runs-on: ubuntu-latest
    needs: [build-linux-windows, build-macos]
    steps:
      - name: Download all uploaded artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_artifacts

      - name: List artifacts
        run: ls -la release_artifacts

      - name: Create GitHub Release and upload artifacts
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          # upload the files you downloaded; use globbing
          files: |
            release_artifacts/**/*.zip
            release_artifacts/**/*.tar.gz
            release_artifacts/**/*.exe
            release_artifacts/**/*.dmg
            release_artifacts/**/*.app